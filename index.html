<!DOCTYPE html>
<html>
<head>
<title>For Bubu ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: #f5f5f5;
  overflow: hidden;
}

/* Stars */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/1ZQZ1ZQ.png') repeat;
  animation: moveStars 60s linear infinite;
  z-index: -2;
}

@keyframes moveStars {
  from { background-position: 0 0; }
  to { background-position: 10000px 5000px; }
}

/* Petals */
.petal {
  position: fixed;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
  z-index: -1;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* Center */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Glow name */
.name {
  font-size: 26px;
  margin-bottom: 20px;
  color: #ffb3c6;
  text-shadow: 0 0 10px #ff8fab, 0 0 20px #ff8fab;
  animation: glow 2s ease-in-out infinite alternate;
  text-align: center;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff8fab; }
  to { text-shadow: 0 0 25px #ff4d6d; }
}

/* Envelope */
.envelope {
  width: 200px;
  height: 120px;
  background: #ff8fab;
  cursor: pointer;
  border-radius: 5px;
}

.envelope:before {
  content: "";
  position: absolute;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid #ffb3c6;
}

/* Letter */
#letter {
  display: none;
  max-width: 700px;
  margin-top: 20px;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  line-height: 1.7;
  white-space: pre-line;
}

/* Heart */
.heart {
  text-align: center;
  font-size: 28px;
  margin-top: 20px;
  animation: beat 1.5s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="stars"></div>

<div class="container">

<div class="name">For Bubu ❤️</div>

<div class="envelope" onclick="openLetter()"></div>
<div style="text-align:center; margin-top:10px;">Tap to open 💌</div>

<div id="letter">
<p id="text"></p>
<div class="heart">❤️</div>
</div>

</div>

<!-- Romantic Background Music -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b3c2f.mp3?filename=romantic-piano-110624.mp3" type="audio/mpeg">
</audio>

<script>

// Play music on click (important for mobile)
function openLetter() {
  document.getElementById("letter").style.display = "block";
  document.getElementById("bgMusic").play();
  typeWriter();
}

// Falling petals
for (let i = 0; i < 25; i++) {
  let petal = document.createElement("div");
  petal.className = "petal";
  petal.innerHTML = "🌸";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(petal);
}

const message = `My Dearest Bubu,

I am writing this with a heart that feels impossibly heavy...

I am so deeply sorry for falling asleep when you needed me.

You matter to me more than anything.

Last night, you deserved my time, my presence… and instead, I gave you silence.

I never want to be the reason you feel unimportant.

You are my peace, my comfort, my safe place.

I’m not asking you to forget… just to give me a chance to make it right.

Because everything feels incomplete when something is wrong between us.

I’m truly sorry.

With all my heart,  
Yours ❤️`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    let speed = (i > message.length - 80) ? 40 : 15;
    setTimeout(typeWriter, speed);
  }
}

</script>

</body>
</html>
